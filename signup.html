<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create your CloudShare account</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #1e3a8a 0%, #0f172a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      padding: 20px;
    }
    .container {
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    .logo { font-size: 48px; margin-bottom: 8px; }
    .brand {
      font-size: 32px;
      font-weight: 300;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }
    .tagline { color: #94a3b8; font-size: 14px; margin-bottom: 32px; }
    .form-card {
      background: rgba(30, 41, 59, 0.6);
      backdrop-filter: blur(20px);
      border-radius: 16px;
      padding: 32px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    h1 { font-size: 22px; font-weight: 500; margin-bottom: 24px; }
    .input-group { margin-bottom: 16px; text-align: left; }
    label {
      display: block;
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(15, 23, 42, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      color: #fff;
      font-size: 15px;
      outline: none;
      transition: border 0.2s;
    }
    input:focus { border-color: #38bdf8; }
    .hint {
      font-size: 12px;
      color: #64748b;
      margin-top: 4px;
    }
    .btn {
      width: 100%;
      padding: 14px;
      background: #fff;
      color: #0f172a;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 8px;
      transition: transform 0.1s;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .footer-link {
      margin-top: 24px;
      font-size: 14px;
      color: #94a3b8;
    }
    .footer-link a { color: #38bdf8; text-decoration: none; }
    .error {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #fca5a5;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    .success {
      background: rgba(34, 197, 94, 0.15);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: #86efac;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">☁️</div>
    <div class="brand">CloudShare</div>
    <div class="tagline">Create your account.</div>

    <div class="form-card">
      <h1>Sign Up</h1>
      <div class="error" id="error"></div>
      <div class="success" id="success"></div>

      <div class="input-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="yourname" autocomplete="username">
      </div>
      <div class="input-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="input-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="new-password">
        <div class="hint">At least 8 characters</div>
      </div>
      <button class="btn" id="signupBtn" onclick="signUp()">Create Account</button>
    </div>

    <div class="footer-link">
      Already have an account? <a href="login.html">Sign in</a>
    </div>
  </div>

  <script>
    const API_URL = 'https://cloudshare-api-subeg-eucyg3bne8hnh8bk.spaincentral-01.azurewebsites.net';

    async function signUp() {
      const username = document.getElementById('username').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('error');
      const successEl = document.getElementById('success');
      const btn = document.getElementById('signupBtn');

      errorEl.style.display = 'none';
      successEl.style.display = 'none';

      if (!username || !email || !password) {
        errorEl.textContent = 'All fields are required';
        errorEl.style.display = 'block';
        return;
      }
      if (password.length < 8) {
        errorEl.textContent = 'Password must be at least 8 characters';
        errorEl.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Creating account...';

      try {
        const res = await fetch(`${API_URL}/api/signup`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, email, password })
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.error || 'Signup failed');

        successEl.textContent = 'Account created! Redirecting to sign in...';
        successEl.style.display = 'block';
        setTimeout(() => window.location.href = 'login.html', 1500);
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    }

    document.getElementById('password').addEventListener('keypress', e => {
      if (e.key === 'Enter') signUp();
    });
  </script>
</body>
</html>
