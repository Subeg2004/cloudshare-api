<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudShare - File Upload</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .upload-section {
            border: 2px dashed #667eea;
            border-radius: 8px;
            padding: 30px;
            text-align: center;
            margin-bottom: 30px;
            background: #f8f9ff;
        }

        .upload-section input[type="file"] {
            display: none;
        }

        .upload-label {
            cursor: pointer;
            color: #667eea;
            font-weight: 600;
            display: block;
            margin-bottom: 10px;
        }

        .upload-label:hover {
            color: #764ba2;
        }

        .upload-text {
            color: #999;
            font-size: 14px;
        }

        .btn-upload {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 15px;
            transition: transform 0.2s;
        }

        .btn-upload:hover {
            transform: translateY(-2px);
        }

        .btn-upload:active {
            transform: translateY(0);
        }

        .loading {
            display: none;
            text-align: center;
            color: #667eea;
            margin: 20px 0;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .message {
            padding: 12px;
            margin: 15px 0;
            border-radius: 5px;
            display: none;
        }

        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .files-section {
            margin-top: 30px;
        }

        .files-section h2 {
            color: #333;
            font-size: 18px;
            margin-bottom: 20px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .file-list {
            list-style: none;
        }

        .file-item {
            background: #f8f9ff;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid #667eea;
        }

        .file-info {
            flex: 1;
        }

        .file-name {
            color: #333;
            font-weight: 600;
            word-break: break-word;
        }

        .file-size {
            color: #999;
            font-size: 12px;
            margin-top: 5px;
        }

        .file-actions {
            display: flex;
            gap: 10px;
        }

        .btn-small {
            padding: 8px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-download {
            background: #667eea;
            color: white;
        }

        .btn-download:hover {
            background: #764ba2;
        }

        .btn-delete {
            background: #ff6b6b;
            color: white;
        }

        .btn-delete:hover {
            background: #ee5a52;
        }

        .empty-state {
            text-align: center;
            color: #999;
            padding: 30px;
        }

        .empty-state-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>☁️ CloudShare</h1>
        <p class="subtitle">Cloud Storage & File Management Platform</p>

        <div class="upload-section">
    <label class="upload-label" for="fileInput">
        📁 Click to select a file or drag and drop
    </label>
    <input type="file" id="fileInput" onchange="displayFileName()" />
    <div id="selectedFileMessage" style="display: none; margin: 15px 0; padding: 12px; background: #e3f2fd; border: 1px solid #90caf9; border-radius: 5px; color: #1976d2;">
        📄 Selected: <span id="selectedFileName"></span>
    </div>
    <p class="upload-text">Max file size: 100MB</p>
    <button class="btn-upload" onclick="uploadFile()">Upload File</button>
</div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Uploading file...</p>
        </div>

        <div class="message" id="successMessage"></div>
        <div class="message error" id="errorMessage"></div>

        <div class="files-section">
            <h2>📂 Your Files</h2>
            <ul class="file-list" id="fileList"></ul>
            <div class="empty-state" id="emptyState">
                <div class="empty-state-icon">📭</div>
                <p>No files uploaded yet</p>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api';

        // Load files on page load
        window.onload = function() {
            loadFiles();
            // Refresh files every 5 seconds
            setInterval(loadFiles, 5000);
        };

        // Upload file
        async function uploadFile() {
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];

            if (!file) {
                showError('Please select a file first');
                return;
            }

            showLoading(true);

            try {
                const reader = new FileReader();
                reader.onload = async function(e) {
                    const base64 = e.target.result.split(',')[1];

                    const response = await fetch(`${API_URL}/upload`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            filename: file.name,
                            fileData: base64,
                            userId: 1
                        })
                    });

                    const data = await response.json();

                    if (data.success) {
                        showSuccess('File uploaded successfully!');
                        fileInput.value = '';
                        loadFiles();
                    } else {
                        showError('Upload failed: ' + (data.error || 'Unknown error'));
                    }
                };

                reader.readAsDataURL(file);
            } catch (error) {
                showError('Error: ' + error.message);
            } finally {
                showLoading(false);
            }
        }

        // Load file list
        async function loadFiles() {
            try {
                const response = await fetch(`${API_URL}/media`);
                const data = await response.json();

                const fileList = document.getElementById('fileList');
                const emptyState = document.getElementById('emptyState');

                fileList.innerHTML = '';

                if (data.success && data.files && data.files.length > 0) {
                    emptyState.style.display = 'none';
                    data.files.forEach(file => {
                        const li = document.createElement('li');
                        li.className = 'file-item';
                        li.innerHTML = `
                            <div class="file-info">
                                <div class="file-name">📄 ${escapeHtml(file.name)}</div>
                                <div class="file-size">${formatFileSize(file.size)}</div>
                            </div>
                            <div class="file-actions">
                                <button class="btn-small btn-download" onclick="downloadFile('${escapeHtml(file.name)}')">
                                    ⬇️ Download
                                </button>
                                <button class="btn-small btn-delete" onclick="deleteFile('${escapeHtml(file.name)}')">
                                    🗑️ Delete
                                </button>
                            </div>
                        `;
                        fileList.appendChild(li);
                    });
                } else {
                    emptyState.style.display = 'block';
                }
            } catch (error) {
                console.error('Error loading files:', error);
            }
        }

        // Download file
        function downloadFile(filename) {
            const url = `${API_URL}/media/${filename}`;
            window.open(url, '_blank');
        }

        // Delete file
        async function deleteFile(filename) {
            if (!confirm(`Are you sure you want to delete "${filename}"?`)) {
                return;
            }

            try {
                const response = await fetch(`${API_URL}/media/${filename}`, {
                    method: 'DELETE'
                });

                const data = await response.json();

                if (data.success) {
                    showSuccess('File deleted successfully!');
                    loadFiles();
                } else {
                    showError('Delete failed: ' + (data.error || 'Unknown error'));
                }
            } catch (error) {
                showError('Error: ' + error.message);
            }
        }

        // Helper functions
        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
        }

        function showSuccess(message) {
            const elem = document.getElementById('successMessage');
            elem.textContent = '✅ ' + message;
            elem.style.display = 'block';
            elem.classList.remove('error');
            elem.classList.add('success');
            setTimeout(() => elem.style.display = 'none', 3000);
        }

        function showError(message) {
            const elem = document.getElementById('errorMessage');
            elem.textContent = '❌ ' + message;
            elem.style.display = 'block';
            elem.classList.remove('success');
            elem.classList.add('error');
        }

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round((bytes / Math.pow(k, i)) * 100) / 100 + ' ' + sizes[i];
        }

        function displayFileName() {
    const fileInput = document.getElementById('fileInput');
    const file = fileInput.files[0];
    const messageDiv = document.getElementById('selectedFileMessage');
    const fileNameSpan = document.getElementById('selectedFileName');

    if (file) {
        fileNameSpan.textContent = file.name + ' (' + formatFileSize(file.size) + ')';
        messageDiv.style.display = 'block';
    } else {
        messageDiv.style.display = 'none';
    }
}
        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // Drag and drop
        const dropZone = document.querySelector('.upload-section');
        
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.style.backgroundColor = '#e8eaff';
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.style.backgroundColor = '#f8f9ff';
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.style.backgroundColor = '#f8f9ff';
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                document.getElementById('fileInput').files = files;
            }
        });
    </script>
</body>
</html>
