<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CloudShare</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(180deg, #1e3a8a 0%, #0f172a 50%);
      min-height: 100vh;
      color: #fff;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .topbar-left { display: flex; align-items: center; gap: 8px; font-size: 17px; }
    .topbar-right { display: flex; align-items: center; gap: 16px; font-size: 14px; }
    .user-name { color: #cbd5e1; }
    .logout-btn {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #fff;
      padding: 6px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
    }
    .logout-btn:hover { background: rgba(255, 255, 255, 0.05); }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    .greeting { margin-bottom: 24px; }
    .greeting h1 { font-size: 28px; font-weight: 500; margin-bottom: 4px; }
    .greeting p { color: #94a3b8; font-size: 14px; }

    .upload-zone {
      background: rgba(30, 41, 59, 0.6);
      backdrop-filter: blur(20px);
      border: 2px dashed rgba(255, 255, 255, 0.15);
      border-radius: 16px;
      padding: 32px;
      text-align: center;
      margin-bottom: 28px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .upload-zone:hover, .upload-zone.dragover {
      border-color: #38bdf8;
      background: rgba(56, 189, 248, 0.05);
    }
    .upload-icon { font-size: 32px; margin-bottom: 8px; }
    .upload-zone h3 { font-size: 16px; font-weight: 500; margin-bottom: 4px; }
    .upload-zone p { color: #94a3b8; font-size: 13px; }
    #fileInput { display: none; }

    .upload-progress {
      margin-top: 12px;
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
      overflow: hidden;
      display: none;
    }
    .upload-progress-bar {
      height: 100%;
      background: #38bdf8;
      width: 0%;
      transition: width 0.3s;
    }

    .categories {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 28px;
    }
    .category-card {
      background: rgba(30, 41, 59, 0.6);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      padding: 20px;
      cursor: pointer;
      transition: transform 0.15s, border-color 0.2s;
    }
    .category-card:hover {
      transform: translateY(-2px);
      border-color: rgba(56, 189, 248, 0.4);
    }
    .category-card.active { border-color: #38bdf8; background: rgba(56, 189, 248, 0.1); }
    .category-icon { font-size: 28px; margin-bottom: 8px; }
    .category-name { font-size: 15px; font-weight: 500; margin-bottom: 2px; }
    .category-count { font-size: 12px; color: #94a3b8; }

    .files-section {
      background: rgba(30, 41, 59, 0.4);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 24px;
    }
    .files-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .files-header h2 { font-size: 16px; font-weight: 500; }
    .clear-filter {
      font-size: 12px;
      color: #38bdf8;
      cursor: pointer;
      background: none;
      border: none;
      display: none;
    }
    .files-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
    }
    .file-card {
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 10px;
      padding: 14px;
      transition: border-color 0.2s;
    }
    .file-card:hover { border-color: rgba(56, 189, 248, 0.3); }
    .file-icon { font-size: 24px; margin-bottom: 6px; }
    .file-name {
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .file-meta { font-size: 11px; color: #64748b; margin-bottom: 8px; }
    .file-actions { display: flex; gap: 6px; }
    .action-btn {
      flex: 1;
      background: rgba(255, 255, 255, 0.05);
      border: none;
      color: #cbd5e1;
      padding: 5px;
      border-radius: 6px;
      font-size: 11px;
      cursor: pointer;
    }
    .action-btn:hover { background: rgba(255, 255, 255, 0.1); }
    .action-btn.danger:hover { background: rgba(239, 68, 68, 0.2); color: #fca5a5; }
    .empty-state {
      text-align: center;
      padding: 32px;
      color: #64748b;
      font-size: 14px;
    }

    .storage-section {
      background: rgba(30, 41, 59, 0.4);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      padding: 20px;
    }
    .storage-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .storage-title { font-size: 15px; font-weight: 500; }
    .storage-amount { font-size: 13px; color: #94a3b8; }
    .storage-bar {
      height: 8px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 4px;
      overflow: hidden;
    }
    .storage-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #38bdf8, #818cf8);
      width: 0%;
      transition: width 0.5s;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 12px 20px;
      background: rgba(15, 23, 42, 0.95);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 10px;
      font-size: 13px;
      display: none;
      max-width: 300px;
      z-index: 100;
    }
    .toast.success { border-color: rgba(34, 197, 94, 0.5); color: #86efac; }
    .toast.error { border-color: rgba(239, 68, 68, 0.5); color: #fca5a5; }

    @media (max-width: 600px) {
      .categories { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-left">☁️ <strong style="font-weight:500">CloudShare</strong></div>
    <div class="topbar-right">
      <span class="user-name" id="userName">Loading...</span>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="container">
    <div class="greeting">
      <h1>Welcome back, <span id="greetingName">there</span></h1>
      <p>Manage your files in one place</p>
    </div>

    <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
      <div class="upload-icon">⬆️</div>
      <h3>Drop files here or click to browse</h3>
      <p>Images, videos, documents up to 50 MB</p>
      <div class="upload-progress" id="uploadProgress">
        <div class="upload-progress-bar" id="uploadProgressBar"></div>
      </div>
    </div>
    <input type="file" id="fileInput" onchange="handleFileSelect(event)">

    <div class="categories">
      <div class="category-card" onclick="filterCategory('drive')" id="cat-drive">
        <div class="category-icon">📁</div>
        <div class="category-name">Drive</div>
        <div class="category-count"><span id="drive-count">0</span> files</div>
      </div>
      <div class="category-card" onclick="filterCategory('notes')" id="cat-notes">
        <div class="category-icon">📝</div>
        <div class="category-name">Notes</div>
        <div class="category-count"><span id="notes-count">0</span> files</div>
      </div>
      <div class="category-card" onclick="filterCategory('photos')" id="cat-photos">
        <div class="category-icon">🖼️</div>
        <div class="category-name">Photos</div>
        <div class="category-count"><span id="photos-count">0</span> files</div>
      </div>
    </div>

    <div class="files-section">
      <div class="files-header">
        <h2 id="filesTitle">All files</h2>
        <button class="clear-filter" id="clearFilter" onclick="clearFilter()">Show all</button>
      </div>
      <div class="files-grid" id="filesGrid"></div>
    </div>

    <div class="storage-section">
      <div class="storage-header">
        <div class="storage-title">Your Storage</div>
        <div class="storage-amount"><span id="usedMB">0</span> MB used of <span id="quotaMB">1024</span> MB</div>
      </div>
      <div class="storage-bar">
        <div class="storage-bar-fill" id="storageBarFill"></div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const API_URL = 'https://cloudshare-api-subeg-eucyg3bne8hnh8bk.spaincentral-01.azurewebsites.net';

    const token = localStorage.getItem('cloudshare_token');
    const user = JSON.parse(localStorage.getItem('cloudshare_user') || 'null');

    if (!token || !user) {
      window.location.href = 'login.html';
    }

    let currentCategory = null;
    let allFiles = [];

    document.getElementById('userName').textContent = user.username;
    document.getElementById('greetingName').textContent = user.username;

    function logout() {
      localStorage.removeItem('cloudshare_token');
      localStorage.removeItem('cloudshare_user');
      window.location.href = 'login.html';
    }

    function showToast(msg, type) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.className = 'toast ' + (type || '');
      toast.style.display = 'block';
      setTimeout(() => toast.style.display = 'none', 3000);
    }

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / 1048576).toFixed(1) + ' MB';
    }

    function formatDate(iso) {
      const d = new Date(iso);
      return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
    }

    function fileIcon(category) {
      if (category === 'photos') return '🖼️';
      if (category === 'notes') return '📝';
      return '📁';
    }

    async function loadStats() {
      try {
        const res = await fetch(`${API_URL}/api/stats`, {
          headers: { Authorization: `Bearer ${token}` }
        });
        const data = await res.json();
        if (!data.success) return;

        const s = data.stats;
        document.getElementById('drive-count').textContent = s.byCategory.drive;
        document.getElementById('notes-count').textContent = s.byCategory.notes;
        document.getElementById('photos-count').textContent = s.byCategory.photos;
        document.getElementById('usedMB').textContent = s.totalSizeMB;
        document.getElementById('quotaMB').textContent = s.storageQuotaMB;
        const pct = Math.min(100, (parseFloat(s.totalSizeMB) / s.storageQuotaMB) * 100);
        document.getElementById('storageBarFill').style.width = pct + '%';
      } catch (err) {
        console.error('Stats error:', err);
      }
    }

    async function loadFiles(category) {
      const url = category ? `${API_URL}/api/media?category=${category}` : `${API_URL}/api/media`;
      try {
        const res = await fetch(url, {
          headers: { Authorization: `Bearer ${token}` }
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.error);
        allFiles = data.files;
        renderFiles();
      } catch (err) {
        showToast('Failed to load files: ' + err.message, 'error');
      }
    }

    function renderFiles() {
      const grid = document.getElementById('filesGrid');
      if (allFiles.length === 0) {
        grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1">No files yet. Upload your first file above.</div>';
        return;
      }
      grid.innerHTML = allFiles.map(f => `
        <div class="file-card">
          <div class="file-icon">${fileIcon(f.category)}</div>
          <div class="file-name" title="${f.originalName}">${f.originalName}</div>
          <div class="file-meta">${formatSize(f.size)} · ${formatDate(f.uploadedAt)}</div>
          <div class="file-actions">
            <button class="action-btn" onclick="downloadFile('${f.blobUrl}', '${f.originalName}')">Download</button>
            <button class="action-btn" onclick="renameFile('${f.id}', '${f.originalName.replace(/'/g, "\\'")}')">Rename</button>
            <button class="action-btn danger" onclick="deleteFile('${f.id}', '${f.originalName.replace(/'/g, "\\'")}')">Delete</button>
          </div>
        </div>
      `).join('');
    }

    function filterCategory(cat) {
      currentCategory = cat;
      document.querySelectorAll('.category-card').forEach(c => c.classList.remove('active'));
      document.getElementById('cat-' + cat).classList.add('active');
      document.getElementById('filesTitle').textContent = cat.charAt(0).toUpperCase() + cat.slice(1);
      document.getElementById('clearFilter').style.display = 'block';
      loadFiles(cat);
    }

    function clearFilter() {
      currentCategory = null;
      document.querySelectorAll('.category-card').forEach(c => c.classList.remove('active'));
      document.getElementById('filesTitle').textContent = 'All files';
      document.getElementById('clearFilter').style.display = 'none';
      loadFiles();
    }

    function handleFileSelect(e) {
      const file = e.target.files[0];
      if (file) uploadFile(file);
    }

    async function uploadFile(file) {
      if (file.size > 50 * 1024 * 1024) {
        showToast('File too large (max 50 MB)', 'error');
        return;
      }
      const progressEl = document.getElementById('uploadProgress');
      const progressBar = document.getElementById('uploadProgressBar');
      progressEl.style.display = 'block';
      progressBar.style.width = '20%';

      const formData = new FormData();
      formData.append('file', file);

      try {
        progressBar.style.width = '60%';
        const res = await fetch(`${API_URL}/api/upload`, {
          method: 'POST',
          headers: { Authorization: `Bearer ${token}` },
          body: formData
        });
        progressBar.style.width = '100%';
        const data = await res.json();
        if (!data.success) throw new Error(data.error);

        showToast('Uploaded: ' + file.name, 'success');
        await Promise.all([loadStats(), loadFiles(currentCategory)]);
      } catch (err) {
        showToast('Upload failed: ' + err.message, 'error');
      } finally {
        setTimeout(() => {
          progressEl.style.display = 'none';
          progressBar.style.width = '0%';
        }, 800);
        document.getElementById('fileInput').value = '';
      }
    }

    function downloadFile(url, name) {
      const a = document.createElement('a');
      a.href = url;
      a.download = name;
      a.target = '_blank';
      a.click();
    }

    async function renameFile(id, currentName) {
      const newName = prompt('New name:', currentName);
      if (!newName || newName === currentName) return;
      try {
        const res = await fetch(`${API_URL}/api/media/${id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
          body: JSON.stringify({ newName })
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.error);
        showToast('Renamed', 'success');
        loadFiles(currentCategory);
      } catch (err) {
        showToast('Rename failed: ' + err.message, 'error');
      }
    }

    async function deleteFile(id, name) {
      if (!confirm(`Delete "${name}"?`)) return;
      try {
        const res = await fetch(`${API_URL}/api/media/${id}`, {
          method: 'DELETE',
          headers: { Authorization: `Bearer ${token}` }
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.error);
        showToast('Deleted', 'success');
        await Promise.all([loadStats(), loadFiles(currentCategory)]);
      } catch (err) {
        showToast('Delete failed: ' + err.message, 'error');
      }
    }

    // Drag and drop
    const dropZone = document.getElementById('uploadZone');
    dropZone.addEventListener('dragover', e => {
      e.preventDefault();
      dropZone.classList.add('dragover');
    });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      if (e.dataTransfer.files[0]) uploadFile(e.dataTransfer.files[0]);
    });

    // Initial load
    loadStats();
    loadFiles();
  </script>
</body>
</html>
