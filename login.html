<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in to CloudShare</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #1e3a8a 0%, #0f172a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }
    .container {
      width: 100%;
      max-width: 400px;
      padding: 40px;
      text-align: center;
    }
    .logo {
      font-size: 48px;
      margin-bottom: 8px;
    }
    .brand {
      font-size: 32px;
      font-weight: 300;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }
    .tagline {
      color: #94a3b8;
      font-size: 14px;
      margin-bottom: 40px;
    }
    .form-card {
      background: rgba(30, 41, 59, 0.6);
      backdrop-filter: blur(20px);
      border-radius: 16px;
      padding: 32px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    h1 {
      font-size: 22px;
      font-weight: 500;
      margin-bottom: 24px;
    }
    .input-group {
      margin-bottom: 16px;
      text-align: left;
    }
    label {
      display: block;
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(15, 23, 42, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      color: #fff;
      font-size: 15px;
      outline: none;
      transition: border 0.2s;
    }
    input:focus {
      border-color: #38bdf8;
    }
    .btn {
      width: 100%;
      padding: 14px;
      background: #fff;
      color: #0f172a;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 8px;
      transition: transform 0.1s;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .footer-link {
      margin-top: 24px;
      font-size: 14px;
      color: #94a3b8;
    }
    .footer-link a {
      color: #38bdf8;
      text-decoration: none;
    }
    .error {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #fca5a5;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">☁️</div>
    <div class="brand">CloudShare</div>
    <div class="tagline">Your files, anywhere.</div>

    <div class="form-card">
      <h1>Sign In</h1>
      <div class="error" id="error"></div>
      <div class="input-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="input-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn" id="signInBtn" onclick="signIn()">Sign In</button>
    </div>

    <div class="footer-link">
      Don't have an account? <a href="signup.html">Create one</a>
    </div>
  </div>

  <script>
    const API_URL = 'https://cloudshare-api-subeg-eucyg3bne8hnh8bk.spaincentral-01.azurewebsites.net';

    async function signIn() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('error');
      const btn = document.getElementById('signInBtn');

      errorEl.style.display = 'none';
      if (!email || !password) {
        errorEl.textContent = 'Please enter email and password';
        errorEl.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Signing in...';

      try {
        const res = await fetch(`${API_URL}/api/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.error || 'Login failed');

        localStorage.setItem('cloudshare_token', data.token);
        localStorage.setItem('cloudshare_user', JSON.stringify(data.user));
        window.location.href = 'index.html';
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    }

    document.getElementById('password').addEventListener('keypress', e => {
      if (e.key === 'Enter') signIn();
    });
  </script>
</body>
</html>
